<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ō Ma Biche — Feed Preview</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
  background: #fff5f7;
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 20px 16px 40px;
}

/* ── WRAPPER ── */
.ig-wrapper {
  width: 100%; max-width: 480px;
  background: #fff;
  border: 0.5px solid #f5c8d4;
  border-radius: 16px;
  overflow: hidden;
}

/* ── TOP BAR ── */
.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px;
  border-bottom: 0.5px solid #fde8ee;
  background: #fff;
}
.top-bar-title {
  font-size: 13px; font-weight: 600; color: #1a1a1a; letter-spacing: 0.2px;
}
.top-bar-right { display: flex; gap: 6px; align-items: center; }

.icon-btn {
  font-size: 11px; font-weight: 600; color: #e0607a;
  border: 0.5px solid #fde8ee; background: transparent;
  cursor: pointer; padding: 4px 10px; border-radius: 20px;
  font-family: inherit; transition: all 0.15s; white-space: nowrap;
}
.icon-btn:hover { background: #fde8ee; }
.icon-btn.active { background: #ffabbf; color: #fff; border-color: #ffabbf; }

.save-indicator {
  font-size: 10px; color: #bbb; letter-spacing: 0.2px;
  transition: color 0.3s;
}
.save-indicator.saved { color: #4caf82; }
.save-indicator.saving { color: #ffabbf; }

/* ── GRID ── */
.ig-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 2px;
  background: #fde8ee;
  width: 100%;
}

.ig-cell {
  aspect-ratio: 1;
  position: relative;
  background: #fce0e8;
  cursor: pointer;
  overflow: hidden;
}
.ig-cell img {
  width: 100%; height: 100%;
  object-fit: cover; display: block;
  transition: transform 0.25s;
}
.ig-cell:hover img { transform: scale(1.04); }

.ig-cell-placeholder {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 6px; background: #fff0f3;
  transition: background 0.2s;
}
.ig-cell:hover .ig-cell-placeholder { background: #fde8ee; }
.ig-cell-placeholder svg { opacity: 0.3; }
.ig-cell-placeholder-label {
  font-size: 9px; color: #d4a0ac; text-align: center;
  padding: 0 8px; line-height: 1.3; font-weight: 500;
}

.ig-cell-overlay {
  position: absolute; inset: 0;
  background: rgba(224,96,122,0);
  display: flex; align-items: flex-start; justify-content: flex-end;
  padding: 6px; transition: background 0.2s;
}
.ig-cell:hover .ig-cell-overlay { background: rgba(224,96,122,0.12); }

.status-badge {
  font-size: 9px; font-weight: 600; padding: 2px 6px;
  border-radius: 20px; letter-spacing: 0.4px; text-transform: uppercase;
}
.status-published { background: #d4f0e4; color: #1a6b40; }
.status-scheduled  { background: #fff3cd; color: #7a5000; }
.status-draft      { background: #fde8ee; color: #c05070; }

.ig-cell-pillar {
  position: absolute; bottom: 6px; left: 6px;
  width: 7px; height: 7px; border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.8);
}
.pillar-transformation { background: #e0607a; }
.pillar-expertise      { background: #a0506a; }
.pillar-confiance      { background: #ffabbf; }
.pillar-connexion      { background: #fff0f3; border: 1.5px solid #ffabbf; }

.format-icon {
  position: absolute; bottom: 6px; right: 6px;
  font-size: 9px; font-weight: 700; padding: 2px 5px; border-radius: 4px;
  background: rgba(255,255,255,0.85); color: #c05070; letter-spacing: 0.3px;
}
.format-icon.has-video { background: rgba(224,96,122,0.9); color: #fff; }

.ig-cell-num {
  position: absolute; top: 6px; left: 6px;
  font-size: 10px; font-weight: 700; color: #fff;
  background: rgba(0,0,0,0.38);
  width: 20px; height: 20px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.2s;
}
.ig-cell:hover .ig-cell-num { opacity: 1; }

/* ── STATS BAR ── */
.grid-stats {
  padding: 10px 14px 6px;
  display: flex; align-items: center; gap: 10px;
  border-top: 0.5px solid #fde8ee;
}
.grid-counter { font-size: 11px; color: #ccc; white-space: nowrap; }
.grid-counter strong { color: #e0607a; font-weight: 600; }
.progress-bar-wrap { flex: 1; height: 3px; background: #fde8ee; border-radius: 3px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: linear-gradient(90deg,#ffabbf,#e0607a); border-radius: 3px; transition: width 0.4s ease; }

/* ── PILLAR FILTER ── */
.pillar-filter {
  padding: 0 14px 10px;
  display: flex; flex-wrap: wrap; gap: 6px;
}
.pf-btn {
  display: flex; align-items: center; gap: 4px;
  font-size: 10px; color: #bbb; cursor: pointer;
  padding: 3px 9px; border-radius: 20px;
  border: 0.5px solid #fde8ee; background: transparent;
  font-family: inherit; transition: all 0.15s;
}
.pf-btn:hover { background: #fff5f7; color: #e0607a; border-color: #ffabbf; }
.pf-btn.active { background: #fde8ee; color: #c05070; border-color: #ffabbf; font-weight: 600; }
.pf-dot { width: 7px; height: 7px; border-radius: 50%; }

/* ── ADD BUTTON ── */
.add-post-btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  margin: 10px 14px; padding: 9px;
  border: 1px dashed #ffabbf; border-radius: 8px;
  font-size: 12px; color: #e0607a; cursor: pointer;
  background: transparent; width: calc(100% - 28px);
  font-family: inherit; transition: background 0.2s;
}
.add-post-btn:hover { background: #fff5f7; }

/* ── FOOTER ── */
.ig-footer {
  padding: 8px 14px; border-top: 0.5px solid #fde8ee;
  font-size: 10px; color: #ddd; text-align: center; letter-spacing: 0.3px;
}

/* ── MODAL OVERLAY ── */
.modal {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.6); z-index: 200;
  align-items: center; justify-content: center; padding: 20px;
}
.modal.open { display: flex; }
.modal-card {
  background: #fff; border-radius: 14px;
  width: 100%; max-width: 360px; max-height: 92vh;
  overflow-y: auto; border: 0.5px solid #fde8ee;
}

/* ── MODAL MEDIA ── */
.modal-img {
  width: 100%; aspect-ratio: 1; object-fit: cover;
  background: #fde8ee; border-radius: 14px 14px 0 0; display: block;
}
.modal-img-placeholder {
  width: 100%; aspect-ratio: 1; background: #fff0f3;
  border-radius: 14px 14px 0 0;
  display: flex; align-items: center; justify-content: center;
}
.modal-video {
  width: 100%; aspect-ratio: 9/16; max-height: 360px;
  object-fit: contain; background: #111;
  border-radius: 14px 14px 0 0; display: block;
}

/* ── MODAL NAV ── */
.modal-nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px; border-bottom: 0.5px solid #fde8ee;
}
.nav-btn {
  font-size: 11px; font-weight: 600; color: #e0607a;
  border: none; background: none; cursor: pointer;
  padding: 4px 8px; border-radius: 6px; font-family: inherit;
  transition: background 0.15s;
}
.nav-btn:hover:not(:disabled) { background: #fde8ee; }
.nav-btn:disabled { color: #ddd; cursor: default; }

/* ── MODAL BODY ── */
.modal-body { padding: 14px; }
.modal-header {
  display: flex; align-items: center;
  justify-content: flex-end; margin-bottom: 8px;
}
.modal-close {
  width: 28px; height: 28px; border: none;
  background: #fde8ee; border-radius: 50%;
  cursor: pointer; font-size: 14px; color: #c05070;
  display: flex; align-items: center; justify-content: center;
}
.modal-meta { display: flex; gap: 6px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }

.pillar-tag {
  font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px;
  text-transform: uppercase; letter-spacing: 0.4px;
}
.pt-transformation { background: #fde8ee; color: #c04060; }
.pt-expertise      { background: #f5edf0; color: #804050; }
.pt-confiance      { background: #fff0f3; color: #b06070; }
.pt-connexion      { background: #faf8f5; color: #a08080; border: 1px solid #fde8ee; }
.format-tag {
  font-size: 10px; padding: 2px 8px; border-radius: 20px;
  background: #fff3cd; color: #7a5000; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.4px;
}

/* ── FORM FIELDS ── */
.field-label {
  font-size: 10px; color: #bbb; margin-bottom: 3px;
  display: block; margin-top: 10px; text-transform: uppercase; letter-spacing: 0.4px;
  font-weight: 600;
}
.field-label:first-child { margin-top: 0; }
.field-input {
  width: 100%; padding: 7px 10px; font-size: 12px;
  border: 0.5px solid #fde8ee; border-radius: 8px;
  outline: none; color: #333; background: #fff8fa;
  font-family: inherit; transition: border-color 0.2s;
}
.field-input:focus { border-color: #ffabbf; }
textarea.field-input { resize: vertical; }

.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
.field-row > div { display: flex; flex-direction: column; }
.field-row .field-label { margin-top: 0; }

/* ── CAPTION COUNTER ── */
.caption-wrap { position: relative; margin-top: 10px; }
.caption-counter {
  position: absolute; bottom: 8px; right: 8px;
  font-size: 10px; color: #ccc; pointer-events: none;
  background: rgba(255,248,250,0.9); padding: 1px 4px; border-radius: 4px;
  font-weight: 500; transition: color 0.2s;
}
.caption-counter.ok      { color: #4caf82; }
.caption-counter.warning { color: #e0607a; }
.caption-counter.over    { color: #c03040; }
.caption-hint {
  font-size: 10px; margin-top: 3px; letter-spacing: 0.2px;
}
.caption-hint.ok      { color: #4caf82; }
.caption-hint.warning { color: #ff8c00; }
.caption-hint.over    { color: #c03040; }

/* ── COPY BUTTON ── */
.field-with-copy { position: relative; }
.copy-btn {
  position: absolute; top: 50%; right: 8px; transform: translateY(-50%);
  font-size: 10px; font-weight: 600; color: #e0607a;
  background: rgba(255,248,250,0.9); border: none; cursor: pointer;
  padding: 2px 7px; border-radius: 4px; font-family: inherit;
  transition: background 0.15s;
}
.copy-btn:hover { background: #fde8ee; }
.copy-btn.copied { color: #4caf82; }
.field-with-copy .field-input { padding-right: 56px; }

/* ── URL SECTION ── */
.url-section {
  padding: 12px 14px 14px;
  border-top: 0.5px solid #fde8ee;
}
.section-divider {
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px;
  color: #ddd; font-weight: 600; margin-bottom: 8px;
}
.apply-btn {
  margin-top: 12px; padding: 9px 14px; font-size: 12px;
  background: #ffabbf; color: #fff; border: none; border-radius: 8px;
  cursor: pointer; width: 100%; font-family: inherit; font-weight: 600;
  transition: background 0.2s; letter-spacing: 0.3px;
}
.apply-btn:hover { background: #e0607a; }

/* ── PRESENTATION MODE ── */
body.present-mode .ig-wrapper {
  border: none;
  border-radius: 0;
  max-width: 100%;
}
body.present-mode .top-bar { display: none; }
body.present-mode .grid-stats { display: none; }
body.present-mode .pillar-filter { display: none; }
body.present-mode .add-post-btn { display: none; }
body.present-mode .ig-footer { display: none; }
body.present-mode .ig-cell { cursor: default; }
body.present-mode .ig-cell-num { display: none; }

.present-bar {
  display: none;
  padding: 10px 14px;
  background: #3b0510;
  align-items: center; justify-content: space-between;
}
body.present-mode .present-bar { display: flex; }
.present-bar-title { font-size: 12px; color: #ffabbf; font-weight: 600; letter-spacing: 0.3px; }
.present-exit-btn {
  font-size: 11px; color: #fff; background: rgba(255,171,191,0.2);
  border: 0.5px solid rgba(255,171,191,0.4); border-radius: 20px;
  padding: 4px 12px; cursor: pointer; font-family: inherit; transition: background 0.15s;
}
.present-exit-btn:hover { background: rgba(255,171,191,0.35); }

/* ── ADD MODAL ── */
.content-map { padding: 12px 14px; display: none; }
.content-map.visible { display: block; }
.month-sep {
  font-size: 10px; font-weight: 600; color: #ffabbf;
  text-transform: uppercase; letter-spacing: 0.8px;
  padding: 8px 0 4px; border-bottom: 0.5px solid #fde8ee; margin-bottom: 4px;
}
.map-row {
  display: flex; align-items: center; gap: 10px; padding: 9px 0;
  border-bottom: 0.5px solid #fde8ee; cursor: pointer;
  border-radius: 6px; transition: background 0.15s;
}
.map-row:last-child { border-bottom: none; }
.map-row:hover { background: #fff5f7; }
.map-num { font-size: 11px; color: #ddd; width: 18px; text-align: right; flex-shrink: 0; }
.map-pillar-bar { width: 4px; height: 34px; border-radius: 3px; flex-shrink: 0; }
.map-info { flex: 1; min-width: 0; }
.map-title { font-size: 12px; font-weight: 500; color: #1a1a1a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.map-meta { font-size: 10px; color: #bbb; margin-top: 1px; }
.map-status { flex-shrink: 0; }
</style>
</head>
<body>

<div class="ig-wrapper">

  <!-- PRESENTATION MODE BAR -->
  <div class="present-bar">
    <span class="present-bar-title">Ō Ma Biche — Aperçu feed Instagram</span>
    <button class="present-exit-btn" onclick="exitPresent()">✕ Quitter</button>
  </div>

  <!-- TOP BAR -->
  <div class="top-bar">
    <span class="top-bar-title">Ō Ma Biche · Feed Mois d'Avril <span style="font-size:10px;font-weight:400;color:#bbb;margin-left:6px">· Google Sheets</span></span>
    <div class="top-bar-right">
      <span class="save-indicator" id="saveIndicator">● chargement…</span>
      <button class="icon-btn" onclick="enterPresent()" title="Mode présentation">Présenter</button>
    </div>
  </div>

  <!-- GRID -->
  <div class="ig-grid" id="igGrid"></div>

  <!-- STATS -->
  <div class="grid-stats">
    <div class="grid-counter">
      <strong id="publishedCount">0</strong> pub · 
      <strong id="scheduledCount">0</strong> planif · 
      <strong id="draftCount">0</strong> brouill
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
    </div>
  </div>

  <!-- PILLAR FILTER -->
  <div class="pillar-filter">
    <button class="pf-btn active" onclick="filterPillar('all',this)">Tous</button>
    <button class="pf-btn" onclick="filterPillar('transformation',this)"><div class="pf-dot" style="background:#e0607a"></div>Transformation</button>
    <button class="pf-btn" onclick="filterPillar('expertise',this)"><div class="pf-dot" style="background:#a0506a"></div>Expertise</button>
    <button class="pf-btn" onclick="filterPillar('confiance',this)"><div class="pf-dot" style="background:#ffabbf"></div>Confiance</button>
    <button class="pf-btn" onclick="filterPillar('connexion',this)"><div class="pf-dot" style="background:#fde8ee;border:1px solid #ffabbf"></div>Connexion</button>
  </div>

  <!-- ADD BUTTON -->
  <button class="add-post-btn" onclick="openAddModal()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Ajouter un post
  </button>

  <div class="ig-footer">Ō Ma Biche · Feed Preview — Atelier Léman Digitale</div>
</div>

<!-- ── POST MODAL ── -->
<div class="modal" id="postModal" onclick="handleModalClick(event,'postModal')">
  <div class="modal-card">
    <div id="modalImgArea"></div>
    <div class="modal-nav">
      <button class="nav-btn" id="prevBtn" onclick="navigatePost(-1)">‹ Préc.</button>
      <span id="navCounter" style="font-size:11px;color:#ccc"></span>
      <button class="nav-btn" id="nextBtn" onclick="navigatePost(1)">Suiv. ›</button>
    </div>
    <div class="modal-body">
      <div class="modal-header">
        <button class="modal-close" onclick="closeModal('postModal')">✕</button>
      </div>
      <div class="modal-meta" id="modalMeta"></div>

      <label class="field-label">Titre</label>
      <input class="field-input" id="editTitle" placeholder="Titre du post..." />

      <div class="field-row">
        <div>
          <label class="field-label">Statut</label>
          <select class="field-input" id="editStatus">
            <option value="draft">Brouillon</option>
            <option value="scheduled">Planifié</option>
            <option value="published">Publié</option>
          </select>
        </div>
        <div>
          <label class="field-label">Format</label>
          <select class="field-input" id="editFormat">
            <option value="Reel">Reel</option>
            <option value="Carousel">Carousel</option>
            <option value="Post">Post statique</option>
          </select>
        </div>
      </div>

      <div class="caption-wrap">
        <label class="field-label" style="margin-top:10px">Caption</label>
        <textarea class="field-input" id="editCaption" rows="4"
          placeholder="Texte du post..." oninput="updateCaptionCounter()"></textarea>
        <span class="caption-counter" id="captionCounter">0</span>
      </div>
      <div class="caption-hint" id="captionHint"></div>

      <label class="field-label">Hashtags</label>
      <div class="field-with-copy">
        <input class="field-input" id="editHashtags" placeholder="#lausanne #microshading..." />
        <button class="copy-btn" id="copyHashtagsBtn" onclick="copyField('editHashtags','copyHashtagsBtn')">Copier</button>
      </div>

      <label class="field-label">Date prévue</label>
      <input class="field-input" id="editDate" placeholder="Ex: 14 avr. 2026" />
    </div>

    <div class="url-section">
      <div class="section-divider">Image & Vidéo</div>
      <label class="field-label">URL Cover / Image</label>
      <input class="field-input" type="url" id="urlInput" placeholder="https://..." />
      <div id="urlHint" style="font-size:10px;color:#bbb;margin-top:4px;line-height:1.5;display:none"></div>
      <label class="field-label">URL Vidéo Reel (.mp4, Drive, Dropbox…)</label>
      <input class="field-input" type="url" id="videoInput" placeholder="https://..." />
      <button class="apply-btn" onclick="savePost()">Enregistrer — ⌘↵</button>
    </div>
  </div>
</div>

<!-- ── ADD MODAL ── -->
<div class="modal" id="addModal" onclick="handleModalClick(event,'addModal')">
  <div class="modal-card">
    <div class="modal-body">
      <div class="modal-header">
        <button class="modal-close" onclick="closeModal('addModal')">✕</button>
      </div>
      <div style="margin-bottom:12px">
        <p style="font-size:14px;font-weight:600;color:#1a1a1a">Nouveau post</p>
      </div>

      <label class="field-label">Titre *</label>
      <input class="field-input" id="newTitle" placeholder="Ex: Avant/après microshading" />

      <div class="field-row">
        <div>
          <label class="field-label">Pilier</label>
          <select class="field-input" id="newPillar">
            <option value="transformation">Transformation</option>
            <option value="expertise">Expertise</option>
            <option value="confiance">Confiance</option>
            <option value="connexion">Connexion</option>
          </select>
        </div>
        <div>
          <label class="field-label">Format</label>
          <select class="field-input" id="newFormat">
            <option value="Reel">Reel</option>
            <option value="Carousel">Carousel</option>
            <option value="Post">Post statique</option>
          </select>
        </div>
      </div>

      <label class="field-label">Statut</label>
      <select class="field-input" id="newStatus">
        <option value="draft">Brouillon</option>
        <option value="scheduled">Planifié</option>
        <option value="published">Publié</option>
      </select>

      <label class="field-label">Caption</label>
      <textarea class="field-input" id="newCaption" rows="3" placeholder="Texte du post..."></textarea>

      <label class="field-label">Hashtags</label>
      <input class="field-input" id="newHashtags" placeholder="#lausanne #microshading..." />

      <label class="field-label">Date prévue</label>
      <input class="field-input" id="newDate" placeholder="Ex: 14 avr. 2026" />

      <button class="apply-btn" onclick="addPost()">Ajouter à la grille</button>
    </div>
  </div>
</div>

<script>
/* ── CONSTANTS ── */
// ⚠️ Remplace cette URL par l'URL de ton Google Apps Script déployé
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby9hyrIS0QYuGQGosmNPMMu2d4yRmQYrUNYG6gd7o4SyM1M7N6vg9HWAtBWfrUvAOOa/exec';
const CAPTION_SOFT = 125;
const CAPTION_MAX  = 2200;

const PILLAR = {
  transformation: { dot:'pillar-transformation', tag:'pt-transformation', label:'Transformation', color:'#e0607a' },
  expertise:      { dot:'pillar-expertise',      tag:'pt-expertise',      label:'Expertise',      color:'#a0506a' },
  confiance:      { dot:'pillar-confiance',       tag:'pt-confiance',      label:'Confiance',      color:'#ffabbf' },
  connexion:      { dot:'pillar-connexion',       tag:'pt-connexion',      label:'Connexion',      color:'#fde8ee' }
};
const STATUS = {
  published: { cls:'status-published', label:'Publié' },
  scheduled:  { cls:'status-scheduled',  label:'Planifié' },
  draft:      { cls:'status-draft',      label:'Brouillon' }
};

/* ── CLEAN POST — nettoie les données venant de Google Sheets ── */
function cleanPost(post) {
  const KNOWN_KEYS = ['id','title','pillar','format','status','date','caption','hashtags','url','videoUrl'];
  const clean = {};

  // Garde uniquement les clés connues
  KNOWN_KEYS.forEach(k => {
    clean[k] = post[k] !== undefined ? post[k] : '';
  });

  // Convertit l'id en number
  if (clean.id && !isNaN(clean.id)) clean.id = Number(clean.id);

  // Nettoie les dates au format JS long (ex: "Tue Apr 14 2026 02:00:00 GMT+...")
  // → extrait uniquement "14 avr. 2026" ou conserve si déjà court
  if (clean.date && clean.date.length > 20) {
    try {
      const d = new Date(clean.date);
      if (!isNaN(d)) {
        clean.date = d.toLocaleDateString('fr-CH', {
          day: 'numeric', month: 'short', year: 'numeric',
          timeZone: 'Europe/Zurich'
        });
      }
    } catch(e) {}
  }

  return clean;
}

/* ── JSONP helper — contourne CORS complètement ── */
function jsonpFetch(url) {
  return new Promise((resolve, reject) => {
    const cbName = '__cb_' + Date.now() + '_' + Math.floor(Math.random() * 1e6);
    const script = document.createElement('script');
    const timeout = setTimeout(() => {
      cleanup();
      reject(new Error('JSONP timeout'));
    }, 12000);

    function cleanup() {
      clearTimeout(timeout);
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
    }

    window[cbName] = function(data) {
      cleanup();
      resolve(data);
    };

    script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cbName;
    script.onerror = () => { cleanup(); reject(new Error('JSONP script error')); };
    document.head.appendChild(script);
  });
}

function loadPosts() {
  setSaveIndicator('saving', '● chargement…');

  // Essai JSONP (contourne CORS)
  jsonpFetch(APPS_SCRIPT_URL + '?method=load')
    .then(data => {
      if (data.ok && Array.isArray(data.posts) && data.posts.length > 0) {
        posts = data.posts.map(cleanPost);
        setSaveIndicator('saved', '● Google Sheets ✓');
        renderGrid();
      } else {
        // Sheet vide → charger défauts et sauvegarder
        posts = JSON.parse(JSON.stringify(DEFAULT_POSTS));
        setSaveIndicator('saving', '● initialisation…');
        renderGrid();
        _pushToSheets();
      }
    })
    .catch(err => {
      console.warn('loadPosts JSONP error:', err);
      // Fallback localStorage
      try {
        const saved = localStorage.getItem('omabiche_posts_backup');
        if (saved) {
          const parsed = JSON.parse(saved);
          if (Array.isArray(parsed) && parsed.length > 0) {
            posts = parsed;
            setSaveIndicator('', '⚠ Sheets off — cache local');
            renderGrid();
            return;
          }
        }
      } catch(e2) {}
      posts = JSON.parse(JSON.stringify(DEFAULT_POSTS));
      setSaveIndicator('', '⚠ Sheets off — données locales');
      renderGrid();
    });
}

function savePosts() {
  // Backup local immédiat
  try { localStorage.setItem('omabiche_posts_backup', JSON.stringify(posts)); } catch(e) {}
  setSaveIndicator('saving', '● sauvegarde…');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => { _pushToSheets(); }, 800);
}

function _pushToSheets() {
  // Envoie les posts en plusieurs petits chunks pour éviter la limite de longueur d'URL GET
  const CHUNK = 3;
  const chunks = [];
  for (let i = 0; i < posts.length; i += CHUNK) {
    chunks.push(posts.slice(i, i + CHUNK));
  }

  // Construit la liste d'appels JSONP séquentiels
  // On envoie d'abord un "clear", puis chaque chunk avec "append"
  function sendClear() {
    return jsonpFetch(APPS_SCRIPT_URL + '?method=clear');
  }

  function sendChunk(chunk) {
    const encoded = encodeURIComponent(JSON.stringify({ posts: chunk }));
    return jsonpFetch(APPS_SCRIPT_URL + '?method=append&data=' + encoded);
  }

  sendClear()
    .then(() => {
      // Envoyer les chunks séquentiellement via reduce
      return chunks.reduce((promise, chunk) => {
        return promise.then(() => sendChunk(chunk));
      }, Promise.resolve());
    })
    .then(() => {
      setSaveIndicator('saved', '● Google Sheets ✓');
      try { localStorage.setItem('omabiche_posts_backup', JSON.stringify(posts)); } catch(e) {}
    })
    .catch(err => {
      setSaveIndicator('', '⚠ sauvé en local seulement');
      console.warn('_pushToSheets error:', err);
    });
}

function setSaveIndicator(cls, text) {
  const el = document.getElementById('saveIndicator');
  el.className = 'save-indicator ' + cls;
  el.textContent = text;
}

/* ── RENDER GRID ── */
function renderGrid() {
  const grid = document.getElementById('igGrid');
  grid.innerHTML = '';
  visiblePosts = (activeFilter === 'all'
    ? posts
    : posts.filter(p => p.pillar === activeFilter)
  ).slice(0, 12);

  visiblePosts.forEach(post => {
    const cell = document.createElement('div');
    cell.className = 'ig-cell';
    const presentMode = document.body.classList.contains('present-mode');
    if (!presentMode) cell.onclick = () => openPostModal(post.id);

    if (post.url) {
      const img = document.createElement('img');
      img.src = post.url; img.alt = post.title;
      img.onerror = () => { img.remove(); cell.insertBefore(makePlaceholder(post), cell.firstChild); };
      cell.appendChild(img);
    } else {
      cell.appendChild(makePlaceholder(post));
    }

    const overlay = document.createElement('div');
    overlay.className = 'ig-cell-overlay';
    const s = STATUS[post.status] || STATUS.draft;
    if (!presentMode) overlay.innerHTML = `<span class="status-badge ${s.cls}">${s.label}</span>`;
    cell.appendChild(overlay);

    const dot = document.createElement('div');
    dot.className = `ig-cell-pillar ${PILLAR[post.pillar]?.dot || ''}`;
    cell.appendChild(dot);

    if (!presentMode) {
      const fmt = document.createElement('div');
      fmt.className = 'format-icon' + (post.format === 'Reel' && post.videoUrl ? ' has-video' : '');
      fmt.textContent = post.format === 'Reel' ? (post.videoUrl ? '▶' : '▷') : post.format === 'Carousel' ? '⊞' : '□';
      cell.appendChild(fmt);

      const num = document.createElement('div');
      num.className = 'ig-cell-num';
      num.textContent = posts.indexOf(post) + 1;
      cell.appendChild(num);
    }

    grid.appendChild(cell);
  });

  updateStats();
}

function updateStats() {
  const pub = visiblePosts.filter(p => p.status === 'published').length;
  const sch = visiblePosts.filter(p => p.status === 'scheduled').length;
  const dra = visiblePosts.filter(p => p.status === 'draft').length;
  const total = visiblePosts.length;
  const pct = total > 0 ? Math.round((pub + sch) / total * 100) : 0;
  document.getElementById('publishedCount').textContent = pub;
  document.getElementById('scheduledCount').textContent = sch;
  document.getElementById('draftCount').textContent = dra;
  document.getElementById('progressBar').style.width = pct + '%';
}

function makePlaceholder(post) {
  const ph = document.createElement('div');
  ph.className = 'ig-cell-placeholder';
  const isReel = post.format === 'Reel';
  ph.innerHTML = isReel
    ? `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#ffabbf" stroke-width="1.5"><polygon points="5,3 19,12 5,21"/></svg><div class="ig-cell-placeholder-label">Reel</div>`
    : `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#ffabbf" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg><div class="ig-cell-placeholder-label">${post.format}</div>`;
  return ph;
}

/* ── FILTER ── */
function filterPillar(pillar, btn) {
  activeFilter = pillar;
  document.querySelectorAll('.pf-btn').forEach(b => b.classList.remove('active'));

/* ── CAPTION COUNTER ── */
function updateCaptionCounter() {
  const ta = document.getElementById('editCaption');
  const counter = document.getElementById('captionCounter');
  const hint = document.getElementById('captionHint');
  const len = ta.value.length;
  counter.textContent = len;

  if (len === 0) {
    counter.className = 'caption-counter';
    hint.textContent = '';
    hint.className = 'caption-hint';
  } else if (len <= CAPTION_SOFT) {
    counter.className = 'caption-counter ok';
    hint.textContent = `✓ Visible sans "Voir plus" (${CAPTION_SOFT - len} caract. restants)`;
    hint.className = 'caption-hint ok';
  } else if (len <= CAPTION_MAX) {
    counter.className = 'caption-counter warning';
    hint.textContent = `⚠ Tronqué après 125 caract. · ${len} / ${CAPTION_MAX}`;
    hint.className = 'caption-hint warning';
  } else {
    counter.className = 'caption-counter over';
    hint.textContent = `✕ Limite dépassée : ${len - CAPTION_MAX} caract. en trop`;
    hint.className = 'caption-hint over';
  }
}

/* ── COPY FIELD ── */
function copyField(fieldId, btnId) {
  const val = document.getElementById(fieldId).value;
  if (!val) return;
  navigator.clipboard.writeText(val).then(() => {
    const btn = document.getElementById(btnId);
    btn.textContent = '✓ Copié';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copier'; btn.classList.remove('copied'); }, 2000);
  }).catch(() => showToast('Copie non supportée', '#aaa'));
}

/* ── POST MODAL ── */
function renderModalMedia(post) {
  const imgArea = document.getElementById('modalImgArea');
  if (post.videoUrl) {
    imgArea.innerHTML = `<video class="modal-video" controls playsinline preload="metadata" src="${post.videoUrl}"></video>`;
  } else if (post.url) {
    imgArea.innerHTML = `<img class="modal-img" src="${post.url}" alt="${post.title}" />`;
  } else {
    const isReel = post.format === 'Reel';
    imgArea.innerHTML = `<div class="modal-img-placeholder">${isReel
      ? '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ffabbf" stroke-width="1.2"><polygon points="5,3 19,12 5,21"/></svg>'
      : '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ffabbf" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>'
    }</div>`;
  }
}

function updateNavButtons() {
  const idx = visiblePosts.findIndex(p => p.id === currentPostId);
  document.getElementById('prevBtn').disabled = idx <= 0;
  document.getElementById('nextBtn').disabled = idx >= visiblePosts.length - 1;
  document.getElementById('navCounter').textContent = visiblePosts.length > 0 ? `${idx + 1} / ${visiblePosts.length}` : '';
}

function navigatePost(dir) {
  const idx = visiblePosts.findIndex(p => p.id === currentPostId);
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= visiblePosts.length) return;
  const video = document.querySelector('.modal-video');
  if (video) video.pause();
  openPostModal(visiblePosts[newIdx].id);
}

function openPostModal(id) {
  currentPostId = id;
  const post = posts.find(p => p.id === id);
  if (!post) return;

  renderModalMedia(post);

  const p = PILLAR[post.pillar] || PILLAR.connexion;
  document.getElementById('modalMeta').innerHTML = `<span class="pillar-tag ${p.tag}">${p.label}</span><span class="format-tag">${post.format}</span>`;

  document.getElementById('editTitle').value    = post.title || '';
  document.getElementById('editStatus').value   = post.status || 'draft';
  document.getElementById('editFormat').value   = post.format || 'Reel';
  document.getElementById('editCaption').value  = post.caption || '';
  document.getElementById('editHashtags').value = post.hashtags || '';
  document.getElementById('editDate').value     = post.date || '';
  document.getElementById('urlInput').value     = post.url || '';
  document.getElementById('videoInput').value   = post.videoUrl || '';

  document.getElementById('copyHashtagsBtn').textContent = 'Copier';
  document.getElementById('copyHashtagsBtn').classList.remove('copied');

  // Validate and hint on URL type
  validateImageUrl(document.getElementById('urlInput').value);
  document.getElementById('urlInput').addEventListener('input', function() {
    validateImageUrl(this.value);
  }, { once: false });

  updateCaptionCounter();
  updateNavButtons();
  openModal('postModal');
  setTimeout(() => document.getElementById('editTitle').focus(), 100);
}

function savePost() {
  if (currentPostId === null) return;
  const post = posts.find(p => p.id === currentPostId);
  if (!post) return;
  const newTitle = document.getElementById('editTitle').value.trim();
  if (!newTitle) { document.getElementById('editTitle').focus(); showToast('Le titre ne peut pas être vide', '#e0607a'); return; }

  post.title    = newTitle;
  post.status   = document.getElementById('editStatus').value;
  post.format   = document.getElementById('editFormat').value;
  post.caption  = document.getElementById('editCaption').value.trim();
  post.hashtags = document.getElementById('editHashtags').value.trim();
  post.date     = document.getElementById('editDate').value.trim();
  post.url      = document.getElementById('urlInput').value.trim();
  post.videoUrl = document.getElementById('videoInput').value.trim();

  savePosts();
  renderGrid();
  closeModal('postModal');
  showToast('✓ Enregistré');
}

/* ── ADD MODAL ── */
function openAddModal() {
  ['newTitle','newCaption','newHashtags','newDate'].forEach(id => document.getElementById(id).value = '');
  openModal('addModal');
  setTimeout(() => document.getElementById('newTitle').focus(), 100);
}

function addPost() {
  const title = document.getElementById('newTitle').value.trim();
  if (!title) { document.getElementById('newTitle').focus(); return; }
  const newPost = {
    id: Date.now(), title,
    url: '', videoUrl: '',
    pillar: document.getElementById('newPillar').value,
    format: document.getElementById('newFormat').value,
    status: document.getElementById('newStatus').value,
    date:   document.getElementById('newDate').value.trim(),
    caption: document.getElementById('newCaption').value.trim(),
    hashtags: document.getElementById('newHashtags').value.trim()
  };
  posts.push(newPost);
  savePosts();
  renderGrid();
  closeModal('addModal');
  showToast('✓ Post ajouté');
}

/* ── HELPERS ── */
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) {
  const v = document.querySelector('.modal-video'); if (v) v.pause();
  document.getElementById(id).classList.remove('open');
}
function handleModalClick(e, id) { if (e.target === document.getElementById(id)) closeModal(id); }

function validateImageUrl(url) {
  const hint = document.getElementById('urlHint');
  if (!url) { hint.style.display = 'none'; return; }
  hint.style.display = 'block';

  // Direct image extensions — OK
  if (/\.(jpg|jpeg|png|webp|gif|avif)(\?.*)?$/i.test(url)) {
    hint.style.color = '#4caf82';
    hint.textContent = '✓ Lien image direct — compatible';
    return;
  }
  // Google Drive view link — OK
  if (url.includes('drive.google.com/uc?export=view') || url.includes('drive.google.com/uc?id')) {
    hint.style.color = '#4caf82';
    hint.textContent = '✓ Google Drive (format correct)';
    return;
  }
  // Google Drive share link — needs converting
  if (url.includes('drive.google.com') && url.includes('/file/d/')) {
    const match = url.match(/\/file\/d\/([^/]+)/);
    if (match) {
      const direct = 'https://drive.google.com/uc?export=view&id=' + match[1];
      hint.style.color = '#e0607a';
      hint.innerHTML = '⚠ Lien Drive à convertir :<br><strong style="user-select:all;font-size:10px">' + direct + '</strong><br><span style="color:#bbb">Copie ce lien et colle-le ici</span>';
      return;
    }
  }
  // Canva design link — not a direct image
  if (url.includes('canva.com/design')) {
    hint.style.color = '#e0607a';
    hint.innerHTML = "⚠ Lien Canva non compatible.<br>Dans Canva : <strong>Partager → Télécharger → PNG</strong><br>Puis héberge l'image sur Drive, puis colle le lien ici.";
    return;
  }
  // Dropbox — check for raw
  if (url.includes('dropbox.com')) {
    if (url.includes('raw=1')) {
      hint.style.color = '#4caf82';
      hint.textContent = '✓ Dropbox (format correct)';
    } else {
      hint.style.color = '#e0607a';
      hint.textContent = '⚠ Dropbox : remplace ?dl=0 par ?raw=1 à la fin du lien';
    }
    return;
  }
  // Unknown — neutral
  hint.style.color = '#bbb';
  hint.textContent = "Lien externe — s'affiche uniquement si c'est une image directe (.jpg, .png…)";
}

function showToast(msg, color) {
  const t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = `position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:${color||'#e0607a'};color:#fff;padding:8px 20px;border-radius:20px;font-size:12px;font-weight:600;z-index:9999;opacity:1;transition:opacity 0.4s;pointer-events:none;white-space:nowrap`;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; setTimeout(() => t.remove(), 400); }, 2000);
}

/* ── KEYBOARD ── */
document.addEventListener('keydown', e => {
  const postOpen = document.getElementById('postModal').classList.contains('open');
  const inInput = ['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName);
  if (e.key === 'Escape') { closeModal('postModal'); closeModal('addModal'); }
  if (e.key === 'Enter' && e.metaKey && postOpen) { e.preventDefault(); savePost(); }
  if (e.key === 'ArrowLeft'  && postOpen && !inInput) navigatePost(-1);
  if (e.key === 'ArrowRight' && postOpen && !inInput) navigatePost(1);
});

/* ── INIT ── */
// loadPosts() appelle renderGrid() via JSONP callback
loadPosts();
