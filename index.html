<title>Ō Ma Biche — Feed Preview</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    background: #fff;
    min-height: 100vh;
    padding: 0; margin: 0;
  }

  .ig-wrapper {
    width: 100%;
    max-width: 100%;
    background: #fff;
    
    border-radius: 0;
    overflow: hidden;
  }

  /* ── PROFILE ── */
  .ig-profile {
    padding: 16px;
    border-bottom: 0.5px solid #fde8ee;
  }

  .ig-profile-top {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 12px;
  }

  .ig-avatar {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: linear-gradient(135deg, #ffabbf, #f07090);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 20px;
    font-weight: 600;
    flex-shrink: 0;
    border: 2.5px solid #ffabbf;
    box-shadow: 0 0 0 2px #fff, 0 0 0 4px #ffabbf;
  }

  .ig-username { font-size: 15px; font-weight: 600; color: #1a1a1a; margin-bottom: 2px; }
  .ig-name { font-size: 12px; color: #aaa; }

  .ig-stats { display: flex; gap: 24px; margin-bottom: 10px; }
  .ig-stat { text-align: center; }
  .ig-stat-num { font-size: 15px; font-weight: 600; color: #1a1a1a; display: block; }
  .ig-stat-label { font-size: 11px; color: #aaa; }

  .ig-bio { font-size: 12px; color: #3a3a3a; line-height: 1.6; margin-bottom: 8px; }
  .ig-link { font-size: 12px; color: #e0607a; font-weight: 500; }

  .ig-follow-btn {
    display: inline-block;
    background: #ffabbf;
    color: #fff;
    font-size: 12px;
    font-weight: 600;
    padding: 6px 20px;
    border-radius: 8px;
    border: none;
    cursor: default;
    margin-top: 10px;
    letter-spacing: 0.3px;
  }

  /* ── TABS ── */
  /* ── GRID ── */
  .ig-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
    background: #fde8ee;
    width: 100%;
  }

  .ig-cell {
    aspect-ratio: 1;
    position: relative;
    background: #fce0e8;
    cursor: pointer;
    overflow: hidden;
  }

  .ig-cell img {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
    transition: transform 0.25s;
  }
  .ig-cell:hover img { transform: scale(1.04); }

  .ig-cell-placeholder {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 6px; background: #fff0f3;
    transition: background 0.2s;
  }
  .ig-cell:hover .ig-cell-placeholder { background: #fde8ee; }
  .ig-cell-placeholder svg { opacity: 0.3; }
  .ig-cell-placeholder-label {
    font-size: 9px; color: #d4a0ac;
    text-align: center; padding: 0 8px; line-height: 1.3;
    font-weight: 500;
  }

  .ig-cell-overlay {
    position: absolute; inset: 0;
    background: rgba(224,96,122,0);
    display: flex; align-items: flex-start; justify-content: flex-end;
    padding: 6px; transition: background 0.2s;
  }
  .ig-cell:hover .ig-cell-overlay { background: rgba(224,96,122,0.12); }

  /* ── BADGES ── */
  .status-badge {
    font-size: 9px; font-weight: 600;
    padding: 2px 6px; border-radius: 20px;
    letter-spacing: 0.4px; text-transform: uppercase;
  }
  .status-published { background: #d4f0e4; color: #1a6b40; }
  .status-scheduled { background: #fff3cd; color: #7a5000; }
  .status-draft { background: #fde8ee; color: #c05070; }

  .ig-cell-pillar {
    position: absolute; bottom: 6px; left: 6px;
    width: 7px; height: 7px; border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.8);
  }
  .pillar-transformation { background: #e0607a; }
  .pillar-expertise      { background: #a0506a; }
  .pillar-confiance      { background: #ffabbf; }
  .pillar-connexion      { background: #fff0f3; border: 1.5px solid #ffabbf; }

  /* ── FORMAT ICONS ── */
  .format-icon {
    position: absolute; bottom: 6px; right: 6px;
    font-size: 9px; font-weight: 700;
    padding: 2px 5px; border-radius: 4px;
    background: rgba(255,255,255,0.85);
    color: #c05070; letter-spacing: 0.3px;
  }

  /* ── ADD BUTTON ── */
  .add-post-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    margin: 14px; padding: 10px;
    border: 1px dashed #ffabbf; border-radius: 8px;
    font-size: 12px; color: #e0607a; cursor: pointer;
    background: transparent; width: calc(100% - 28px);
    font-family: inherit; transition: background 0.2s;
  }
  .add-post-btn:hover { background: #fff5f7; }

  /* ── LEGEND ── */
  .legend {
    padding: 10px 16px; border-top: 0.5px solid #fde8ee;
    display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  }
  .legend-label {
    font-size: 10px; color: #ccc; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px; margin-right: 2px;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: #888; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* ── FOOTER ── */
  .ig-footer {
    padding: 10px 16px; border-top: 0.5px solid #fde8ee;
    font-size: 10px; color: #ddd; text-align: center; letter-spacing: 0.3px;
  }

  /* ── MODAL OVERLAY ── */
  .modal {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.6); z-index: 200;
    align-items: center; justify-content: center; padding: 24px;
  }
  .modal.open { display: flex; }

  .modal-card {
    background: #fff; border-radius: 14px;
    width: 100%; max-width: 360px; max-height: 90vh;
    overflow-y: auto; position: relative;
    border: 0.5px solid #fde8ee;
  }

  .modal-img {
    width: 100%; aspect-ratio: 1; object-fit: cover;
    background: #fde8ee; border-radius: 14px 14px 0 0; display: block;
  }
  .modal-img-placeholder {
    width: 100%; aspect-ratio: 1; background: #fff0f3;
    border-radius: 14px 14px 0 0;
    display: flex; align-items: center; justify-content: center;
  }

  .modal-body { padding: 16px; }
  .modal-header {
    display: flex; align-items: center;
    justify-content: space-between; margin-bottom: 10px;
  }
  .modal-title { font-size: 14px; font-weight: 600; color: #1a1a1a; }
  .modal-close {
    width: 28px; height: 28px; border: none;
    background: #fde8ee; border-radius: 50%;
    cursor: pointer; font-size: 14px;
    display: flex; align-items: center; justify-content: center; color: #c05070;
  }
  .modal-meta { display: flex; gap: 6px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
  .modal-caption { font-size: 12px; color: #555; line-height: 1.7; margin-bottom: 10px; }
  .modal-hashtags { font-size: 11px; color: #e0607a; margin-bottom: 8px; }
  .modal-date { font-size: 11px; color: #bbb; }

  /* ── TAGS ── */
  .pillar-tag {
    font-size: 10px; font-weight: 600;
    padding: 2px 8px; border-radius: 20px;
    text-transform: uppercase; letter-spacing: 0.4px;
  }
  .pt-transformation { background: #fde8ee; color: #c04060; }
  .pt-expertise      { background: #f5edf0; color: #804050; }
  .pt-confiance      { background: #fff0f3; color: #b06070; }
  .pt-connexion      { background: #faf8f5; color: #a08080; border: 1px solid #fde8ee; }

  .format-tag {
    font-size: 10px; padding: 2px 8px; border-radius: 20px;
    background: #fff3cd; color: #7a5000;
    text-transform: uppercase; letter-spacing: 0.4px; font-weight: 600;
  }

  /* ── INPUTS ── */
  .field-label {
    font-size: 11px; color: #bbb; margin-bottom: 4px;
    display: block; margin-top: 10px;
  }
  .field-label:first-child { margin-top: 0; }
  .field-input {
    width: 100%; padding: 7px 10px; font-size: 12px;
    border: 0.5px solid #fde8ee; border-radius: 8px;
    outline: none; color: #333; background: #fff8fa;
    font-family: inherit; transition: border-color 0.2s;
  }
  .field-input:focus { border-color: #ffabbf; }
  textarea.field-input { resize: vertical; }

  .apply-btn {
    margin-top: 12px; padding: 8px 14px; font-size: 12px;
    background: #ffabbf; color: #fff;
    border: none; border-radius: 8px; cursor: pointer;
    width: 100%; font-family: inherit; font-weight: 600;
    transition: background 0.2s; letter-spacing: 0.3px;
  }
  .apply-btn:hover { background: #e0607a; }

  .url-section {
    padding: 14px 16px 16px;
    border-top: 0.5px solid #fde8ee;
  }
  .section-divider {
    font-size: 10px; text-transform: uppercase;
    letter-spacing: 0.5px; color: #ddd; font-weight: 600; margin-bottom: 8px;
  }

  /* ── CONTENT MAP ── */
  .content-map { padding: 12px 16px; display: none; }
  .content-map.visible { display: block; }

  .map-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 0; border-bottom: 0.5px solid #fde8ee; cursor: pointer;
    transition: background 0.15s; margin: 0 -4px; padding-left: 4px;
    border-radius: 6px;
  }
  .map-row:last-child { border-bottom: none; }
  .map-row:hover { background: #fff5f7; }

  .map-num { font-size: 11px; color: #ddd; width: 18px; text-align: right; flex-shrink: 0; }
  .map-pillar-bar { width: 4px; height: 36px; border-radius: 3px; flex-shrink: 0; }
  .map-info { flex: 1; min-width: 0; }
  .map-title { font-size: 12px; font-weight: 500; color: #1a1a1a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .map-meta { font-size: 10px; color: #bbb; margin-top: 2px; }
  .map-status { flex-shrink: 0; }

  /* ── MONTH SEPARATOR ── */
  .month-sep {
    font-size: 10px; font-weight: 600; color: #ffabbf;
    text-transform: uppercase; letter-spacing: 0.8px;
    padding: 8px 0 4px;
    border-bottom: 0.5px solid #fde8ee;
    margin-bottom: 4px;
  }
</style>
</head>

  </div>
</div>

<!-- ADD POST MODAL -->

      <input class="field-input" id="newTitle" placeholder="Ex: Avant/après microshading" />

        <option value="connexion">Connexion</option>

      <label class="field-label">Format</label>

      <label class="field-label">Statut</label>

      <label class="field-label">Caption</label>

      <label class="field-label">Hashtags</label>
      <input class="field-input" id="newHashtags" placeholder="#lausanne #microshading..." />
      <label class="field-label">Mois</label>
      <select class="field-input" id="newMonth">
        <option value="Mois 1 — Avril 2026">Mois 1 — Avril 2026</option>
        <option value="Mois 2 — Mai 2026">Mois 2 — Mai 2026</option>
        <option value="Mois 3 — Juin 2026">Mois 3 — Juin 2026</option>
      </select>
      <label class="field-label">Date prévue</label>
      <input class="field-input" type="date" id="newDate" />
      <button class="apply-btn" onclick="addPost()">Ajouter à la grille</button>
    </div>
  </div>
</div>

/* ── RENDER GRID (12 premiers posts visibles) ── */
function renderGrid() {
  const grid = document.getElementById('igGrid');
  grid.innerHTML = '';
  const visible = posts.slice(0, 12);
  visible.forEach(post => {
    const cell = document.createElement('div');
    cell.className = 'ig-cell';
    cell.onclick = () => openPostModal(post.id);

    if (post.url) {
      const img = document.createElement('img');
      img.src = post.url;
      img.alt = post.title;
      img.onerror = () => { img.remove(); cell.insertBefore(makePlaceholder(post), cell.firstChild); };
      cell.appendChild(img);
    } else {
      cell.appendChild(makePlaceholder(post));
    }

    const overlay = document.createElement('div');
    overlay.className = 'ig-cell-overlay';
    const s = STATUS[post.status] || STATUS.draft;
    overlay.innerHTML = `<span class="status-badge ${s.cls}">${s.label}</span>`;
    cell.appendChild(overlay);

    const dot = document.createElement('div');
    dot.className = `ig-cell-pillar ${PILLAR[post.pillar]?.dot || ''}`;
    cell.appendChild(dot);

    const fmt = document.createElement('div');
    fmt.className = 'format-icon';
    fmt.textContent = post.format === 'Reel' ? '▶' : post.format === 'Carousel' ? '⊞' : '□';
    cell.appendChild(fmt);

    grid.appendChild(cell);
  });
}

function makePlaceholder(post) {
  const ph = document.createElement('div');
  ph.className = 'ig-cell-placeholder';
  ph.innerHTML = `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#ffabbf" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg><div class="ig-cell-placeholder-label">${post.format}</div>`;
  return ph;
}

/* ── RENDER MAP ── */
function renderMap() {
  const map = document.getElementById('mapView');
  map.innerHTML = '';
  let lastMonth = '';
  posts.forEach((post, i) => {
    if (post.month !== lastMonth) {
      const sep = document.createElement('div');
      sep.className = 'month-sep';
      sep.textContent = post.month;
      map.appendChild(sep);
      lastMonth = post.month;
    }
    const p = PILLAR[post.pillar] || PILLAR.connexion;
    const s = STATUS[post.status] || STATUS.draft;
    const row = document.createElement('div');
    row.className = 'map-row';
    row.innerHTML = `
      <div class="map-num">${i+1}</div>
      <div class="map-pillar-bar" style="background:${p.color}"></div>
      <div class="map-info">
        <div class="map-title">${post.title}</div>
        <div class="map-meta">${post.format} · ${post.date || '—'} · <span style="color:${p.color};font-weight:600">${p.label}</span></div>
      </div>
      <div class="map-status"><span class="status-badge ${s.cls}">${s.label}</span></div>
    `;
    row.onclick = () => openPostModal(post.id);
    map.appendChild(row);
  });
}

/* ── TABS ── */
function switchTab(tab, el) {
  document.querySelectorAll('.ig-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('gridView').style.display = tab === 'grid' ? 'block' : 'none';
  const mapView = document.getElementById('mapView');
  if (tab === 'map') { mapView.classList.add('visible'); renderMap(); }
  else { mapView.classList.remove('visible'); }
}

/* ── POST MODAL ── */
function openPostModal(id) {
  currentPostId = id;
  const post = posts.find(p => p.id === id);
  if (!post) return;

  const imgArea = document.getElementById('modalImgArea');
  imgArea.innerHTML = post.url
    ? `<img class="modal-img" src="${post.url}" alt="${post.title}" />`
    : `<div class="modal-img-placeholder"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ffabbf" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg></div>`;

  document.getElementById('modalTitle').textContent = post.title;
  const s = STATUS[post.status] || STATUS.draft;
  const p = PILLAR[post.pillar] || PILLAR.connexion;
  document.getElementById('modalMeta').innerHTML = `<span class="status-badge ${s.cls}">${s.label}</span><span class="pillar-tag ${p.tag}">${p.label}</span><span class="format-tag">${post.format}</span>`;
  document.getElementById('modalCaption').textContent = post.caption || '—';
  document.getElementById('modalHashtags').textContent = post.hashtags || '';
  document.getElementById('modalDate').textContent = post.date ? '📅 ' + post.date + (post.month ? ' · ' + post.month : '') : '';
  document.getElementById('urlInput').value = post.url || '';
  openModal('postModal');
}

function applyUrl() {
  if (currentPostId === null) return;
  const url = document.getElementById('urlInput').value.trim();
  const post = posts.find(p => p.id === currentPostId);
  if (post) { post.url = url; renderGrid(); }
  closeModal('postModal');
}

/* ── ADD MODAL ── */
function openAddModal() {
  ['newTitle','newUrl','newCaption','newHashtags'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('newDate').value = '';
  openModal('addModal');
}

function addPost() {
  const title = document.getElementById('newTitle').value.trim();
  if (!title) { document.getElementById('newTitle').focus(); return; }
  posts.unshift({
    id: Date.now(),
    month: document.getElementById('newMonth').value,
    title,
    url: document.getElementById('newUrl').value.trim(),
    pillar: document.getElementById('newPillar').value,
    format: document.getElementById('newFormat').value,
    status: document.getElementById('newStatus').value,
    date: document.getElementById('newDate').value,
    caption: document.getElementById('newCaption').value.trim(),
    hashtags: document.getElementById('newHashtags').value.trim()
  });
  renderGrid();
  closeModal('addModal');
}

/* ── HELPERS ── */
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function handleModalClick(e, id) { if (e.target === document.getElementById(id)) closeModal(id); }

renderGrid();
</script>
